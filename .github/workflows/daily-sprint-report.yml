# StandupPulse — 6 AM PST Mon–Fri (runs even when your Mac is off)
name: StandupPulse

on:
  schedule:
    # 14:15 UTC = 6:15 AM PST / 7:15 AM PDT (avoid :00 — GitHub delays at top of hour)
    - cron: "15 14 * * 1-5"
  workflow_dispatch:

# Prevent overlapping runs; cancel in-progress if a new one starts
concurrency:
  group: standup-pulse
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Run StandupPulse (retry up to 3x on failure)
        uses: nick-fields/retry@v3
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          max_attempts: 3
          timeout_seconds: 300
          retry_wait_seconds: 30
          retry_on: error
          command: python3 daily-sprint-report.py
